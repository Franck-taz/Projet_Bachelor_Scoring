databases:
  - name: loan-db
    plan: free
    databaseName: loan_db
    user: loan_user

services:
  - type: web
    name: projet-bachelor-scoring
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn projet_bachelor_scoring.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
